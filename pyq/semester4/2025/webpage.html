<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MGKVP BCA Notes, Syllabus & Papers | BCA Guide</title>
    <!-- Font Awesome 6 (free) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }

      body {
        background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* main card grid (simplified version of the previous page) */
      .demo-wrapper {
        max-width: 1200px;
        width: 100%;
      }

      .success-triggers {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 24px;
        margin: 30px 0;
      }

      .card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 32px;
        padding: 28px 20px;
        box-shadow:
          0 20px 40px -8px rgba(0, 20, 50, 0.15),
          0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        transition:
          transform 0.25s ease,
          box-shadow 0.3s ease;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.45);
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 30px 50px -12px rgba(0, 40, 80, 0.25);
      }

      .card i {
        font-size: 2.8rem;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 16px;
      }

      .card h3 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 12px;
      }

      .btn-download {
        background: #0f172a;
        border: none;
        color: white;
        padding: 12px 28px;
        border-radius: 60px;
        font-weight: 500;
        font-size: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.2);
        transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        margin-top: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .btn-download:hover {
        background: #1e293b;
        transform: scale(1.02);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
      }

      .btn-download i {
        color: white;
        font-size: 1rem;
        background: transparent;
        -webkit-background-clip: unset;
        background-clip: unset;
        margin-bottom: 0;
      }

      /* ===== RAZORPAY?STYLE SUCCESS OVERLAY ===== */
      .success-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* hidden by default */
        background: transparent;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        transition: background 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
      }

      .success-overlay.active {
        visibility: visible;
        pointer-events: all; /* catch clicks while animating */
        background: rgba(255, 255, 255, 0.04); /* initial barely visible */
      }

      .success-overlay.success-bg {
        background: #1a4f2e; /* rich deep green ñ final screen */
      }

      /* progress track (horizontal line) */
      .progress-track {
        position: absolute;
        width: 80%;
        max-width: 680px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 100px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(2px);
      }

      /* moving icon wrapper */
      .mover {
        position: absolute;
        left: 0%;
        top: 50%;
        transform: translate(0, -50%);
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 20px #fbbf24);
        will-change: left, transform;
        transition: left 0.001s linear; /* will be overridden by js */
      }

      /* icon shape (book / cap / file) ñ we use graduation cap as main */
      .icon-glow {
        font-size: 3.2rem;
        color: #fbbf24;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 240, 180, 0.9),
          rgba(250, 200, 50, 0.8)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-stroke: 2px rgba(255, 215, 0, 0.2);
        filter: drop-shadow(0 0 25px #fbbf24) drop-shadow(0 0 45px #ffaa00);
        animation: subtleFloat 2s infinite alternate ease-in-out;
      }

      @keyframes subtleFloat {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.02);
        }
      }

      /* glowing motion blur trail (absolutely positioned behind) */
      .trail {
        position: absolute;
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(255, 200, 50, 0.8) 0%,
          rgba(255, 150, 0, 0.4) 50%,
          transparent 90%
        );
        filter: blur(20px);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.7;
        transform: translate(-20%, -20%) scale(1.5);
        transition: opacity 0.1s;
        pointer-events: none;
      }

      /* checkmark (initially hidden) */
      .checkmark {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
        transition:
          transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s ease;
        background: white;
        width: 130px;
        height: 130px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.98);
        box-shadow:
          0 30px 50px -10px rgba(0, 100, 0, 0.5),
          0 0 0 4px rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(4px);
      }

      .checkmark i {
        font-size: 4.5rem;
        color: #1e7b4a;
        filter: drop-shadow(0 4px 6px rgba(0, 80, 20, 0.3));
      }

      /* mover active state */
      .success-overlay.active .mover {
        transition: left 3s cubic-bezier(0.22, 1, 0.36, 1);
      }
      /* hidden utility during final tick */
      .hide-mover .mover {
        opacity: 0;
        transition: opacity 0.15s;
      }

      /* download anchor dummy (to trigger programmatic dl) */
      .hidden-download-link {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="demo-wrapper">
      <div style="text-align: center; margin-bottom: 20px">
        <span
          style="
            background: #2563eb10;
            padding: 8px 24px;
            border-radius: 60px;
            color: #1e293b;
            font-weight: 500;
          "
          ><i class="fas fa-graduation-cap" style="margin-right: 8px"></i>MGKVP
          BCA 2025 papers</span
        >
      </div>
      <div class="success-triggers">
        <!-- card 1 -->
        <div class="card">
          <i class="fas fa-laptop-code"></i>
          <h3>Operating System</h3>
          <a href="os.pdf" class="btn-download" download>
            <i class="fas fa-download"></i> Download Papers
          </a>
        </div>
        <!-- card 2 -->
        <div class="card">
          <i class="fas fa-code"></i>
          <h3>Computer Graphics & Multimedia Application
</h3>
          <a href="cg.pdf" class="btn-download" download>
            <i class="fas fa-download"></i> Download Papers
          </a>
        </div>
        <!-- card 3 -->
        <div class="card">
          <i class="fas fa-microchip"></i>
          <h3>Software Engineering</h3>
          <a href="se.pdf" class="btn-download" download>
            <i class="fas fa-download"></i> Download Papers
          </a>
        </div>
        <!-- card 4 -->
        <div class="card">
          <i class="fas fa-calculator"></i>
          <h3>Graph Theory</h3>
          <a href="graph.pdf" class="btn-download" download>
            <i class="fas fa-download"></i> Download Papers
          </a>
        </div>
        <!-- CARD 5 -->
        <div class="card">
          <i class="fas fa-calculator"></i>
          <h3>Optimization Techniques</h3>
          <a href="ot.pdf" class="btn-download" download>
            <i class="fas fa-download"></i> Download Papers
          </a>
        </div>
      </div>

      <div style="text-align: center; color: #475569; margin: 48px 0 10px">
        MAHATMA GANDHI KASHI VIDYAPITH
      </div>
    </div>

    <!-- hidden iframe / link for download trigger (no actual PDFs, just demonstration) -->
    <iframe id="dummyDownloader" style="display: none"></iframe>

    <!-- SUCCESS OVERLAY (RAZORPAY STYLE) -->
    <div class="success-overlay" id="successOverlay">
      <!-- progress path line -->
      <div class="progress-track"></div>
      <!-- moving icon container -->
      <div class="mover" id="moverIcon">
        <div class="trail"></div>
        <!-- blur trail -->
        <i class="fas fa-graduation-cap icon-glow" id="movingIcon"></i>
      </div>
      <!-- final checkmark -->
      <div class="checkmark" id="checkmarkIcon">
        <i class="fas fa-check"></i>
      </div>
    </div>

    <script>
      (function () {
        const overlay = document.getElementById("successOverlay");
        const mover = document.getElementById("moverIcon");
        const movingIcon = document.getElementById("movingIcon");
        const checkmarkDiv = document.getElementById("checkmarkIcon");
        let animationTimer = null;
        let downloadTimer = null;
        let activePdf = "cpp.pdf"; // default

        // ---- helper to trigger PDF download (simulated) ----

        // ---- reset animation (clean state) ----
        function resetOverlay() {
          overlay.classList.remove("active", "success-bg", "hide-mover");
          mover.style.left = "0%"; // start from 0%
          mover.style.opacity = "5";
          movingIcon.style.opacity = "5";
          movingIcon.classList.remove("fa-check"); // ensure icon type
          movingIcon.classList.add("fa-graduation-cap"); // reset to cap
          movingIcon.style.color = ""; // revert to css
          checkmarkDiv.style.opacity = "0";
          checkmarkDiv.style.transform = "translate(-50%, -50%) scale(0.2)";
          if (animationTimer) clearTimeout(animationTimer);
          if (downloadTimer) clearTimeout(downloadTimer);
        }

        // ---- start animation sequence ----
        function runSuccessAnimation(pdfLink) {
          if (!overlay || !mover) return;

          resetOverlay(); // force reset before start

          // force reflow to reset transition
          void overlay.offsetWidth;

          // set active (makes overlay visible, transparent bg)
          overlay.classList.add("active");

          // start position explicitly
          mover.style.left = "0%";

          // after a micro step, trigger fast horizontal motion
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              // mover uses left transition defined in .success-overlay.active .mover
              mover.style.left = "calc(100% - 80px)"; // go to end (respect mover width)

              // background starts transitioning to green near the end (timed)
              // we schedule midway & final.
              // 0.7s: start turning background greener
              setTimeout(() => {
                overlay.style.background = "rgba(35, 100, 60, 0.8)";
              }, 1600); // just before arrival

              // at 1.0s (icon should be near end), we do the transform
              setTimeout(() => {
                // hide mover, show checkmark with pop
                mover.style.opacity = "0";
                movingIcon.style.opacity = "0";

                overlay.classList.add("success-bg"); // full bright green
                overlay.style.background = "#1e7b4a"; // solid rich green

                // reveal checkmark with bounce
                checkmarkDiv.style.opacity = "1";
                checkmarkDiv.style.transform = "translate(-50%, -50%) scale(1)";

                // tiny haptic feedback (optional)
              }, 980); // slightly before 1.5s total

              // download starts exactly when icon turns to tick (at 1.0s)
              setTimeout(() => {
                const a = document.createElement("a");
                a.href = pdfLink;
                a.download = "";
                document.body.appendChild(a);
                a.click();
                a.remove();
              }, 3000);

              // full screen remains green, then auto close after success view
              setTimeout(() => {
                overlay.classList.remove("active", "success-bg");
                overlay.style.background = ""; // reset
                resetOverlay(); // also reset left,opacity etc
              }, 3000); // show green screen extra moment
            });
          });
        }

        // ---- attach event listeners to all download buttons ----
        document.querySelectorAll(".btn-download").forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();

            const pdfLink = link.getAttribute("href");

            if (overlay.classList.contains("active")) {
              resetOverlay();
              overlay.classList.remove("active", "success-bg");
            }

            overlay.style.background = "";

            runSuccessAnimation(pdfLink);
          });
        });
        // optional: if user clicks overlay during animation, do nothing (it just stays)
        overlay.addEventListener("click", (e) => {
          e.stopPropagation();
          // prevent accidental closing during active animation (we'll auto close anyway)
        });

        // pre-reset on load
        resetOverlay();

        // make sure mover icon is graduation cap (in case check remained)
        movingIcon.className = "fas fa-graduation-cap icon-glow";
      })();
    </script>

    <!-- extra style for smooth glassmorphism and trail effect -->
    <style>
      /* fine tuning for overlay */
      .success-overlay {
        backdrop-filter: blur(0px);
        transition:
          background 0.3s ease,
          backdrop-filter 0.2s;
      }

      .success-overlay.active {
        backdrop-filter: blur(4px);
      }

      .success-overlay.success-bg {
        backdrop-filter: blur(8px);
      }

      .trail {
        background: radial-gradient(
          circle,
          rgba(255, 220, 60, 0.95) 0%,
          rgba(255, 160, 0, 0.5) 60%,
          transparent 90%
        );
        width: 140px;
        height: 140px;
        top: -30px;
        left: -30px;
        filter: blur(28px);
        opacity: 0.9;
        mix-blend-mode: hard-light;
        animation: trailFlicker 0.6s infinite alternate ease-in-out;
      }

      @keyframes trailFlicker {
        0% {
          opacity: 0.7;
          filter: blur(25px);
        }
        100% {
          opacity: 1;
          filter: blur(32px);
        }
      }

      .mover {
        filter: drop-shadow(0 0 15px gold);
        left: 0;
        will-change: left;
      }

      .checkmark {
        background: rgba(255, 255, 255, 1);
        box-shadow:
          0 30px 40px -8px rgba(0, 60, 30, 0.6),
          0 0 0 4px rgba(255, 255, 255, 0.7);
      }

      .checkmark i {
        color: #0e6b3c;
        text-shadow: 0 2px 6px rgba(0, 80, 0, 0.3);
      }

      /* mobile adjustments */
      @media (max-width: 600px) {
        .progress-track {
          width: 90%;
        }
        .mover {
          width: 60px;
          height: 60px;
        }
        .icon-glow {
          font-size: 2.8rem;
        }
        .checkmark {
          width: 100px;
          height: 100px;
        }
        .checkmark i {
          font-size: 3.2rem;
        }
      }

      /* left position fine tune: mover width 80px, so left: calc(100% - 80px) */
      .success-overlay .mover {
        left: 0%;
      }
      /* ensure mover doesn't overflow */
      .success-overlay {
        overflow: hidden;
      }
    </style>
    <!-- dummy download iframe (silent) -->
    <iframe style="display: none"></iframe>
  </body>
</html>
